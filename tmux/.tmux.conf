# Catppuccin Mocha + tmux configuration

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# General settings
set -sg escape-time 1
set -g allow-rename off
set -g history-limit 50000
set -g mouse on
setw -g mouse on

# Vi mode keys
set-window-option -g mode-keys vi

# Terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# Alt-arrow pane switching (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Splits inherit current path
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind \" split-window -c "#{pane_current_path}"

# Disable bells/activity
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# ===== Catppuccin Mocha =====

ctp_mocha_base="#1e1e2e"
ctp_mocha_mantle="#181825"
ctp_mocha_crust="#11111b"
ctp_mocha_surface0="#313244"
ctp_mocha_surface1="#45475a"
ctp_mocha_surface2="#585b70"
ctp_mocha_overlay0="#6c7086"
ctp_mocha_text="#cdd6f4"
ctp_mocha_subtext0="#a6adc8"
ctp_mocha_subtext1="#bac2de"
ctp_mocha_lavender="#b4befe"
ctp_mocha_blue="#89b4fa"
ctp_mocha_sapphire="#74c7ec"
ctp_mocha_green="#a6e3a1"
ctp_mocha_yellow="#f9e2af"
ctp_mocha_peach="#fab387"
ctp_mocha_red="#f38ba8"
ctp_mocha_mauve="#cba6f7"
ctp_mocha_pink="#f5c2e7"
ctp_mocha_flamingo="#f2cdcd"
ctp_mocha_rosewater="#f5e0dc"

# Clock
setw -g clock-mode-colour "$ctp_mocha_blue"

# Mode (copy mode selection)
setw -g mode-style "fg=$ctp_mocha_text,bg=$ctp_mocha_surface2,bold"

# Pane borders
set -g pane-border-style "fg=$ctp_mocha_surface1"
set -g pane-active-border-style "fg=$ctp_mocha_blue"

# Status bar
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=$ctp_mocha_mantle,fg=$ctp_mocha_text"
set -g status-left-length 40
set -g status-right-length 60

# Status left: session name
set -g status-left "#[bg=$ctp_mocha_mauve,fg=$ctp_mocha_base,bold]  #S #[bg=$ctp_mocha_mantle,fg=$ctp_mocha_mauve] "

# Status right: hostname + date + time
set -g status-right "#[bg=$ctp_mocha_mantle,fg=$ctp_mocha_surface0]#[bg=$ctp_mocha_surface0,fg=$ctp_mocha_text] #h #[bg=$ctp_mocha_surface1,fg=$ctp_mocha_text] %m-%d #[bg=$ctp_mocha_blue,fg=$ctp_mocha_base,bold] %H:%M "

# Window status
setw -g window-status-format "#[bg=$ctp_mocha_mantle,fg=$ctp_mocha_surface1] #I:#W "
setw -g window-status-current-format "#[bg=$ctp_mocha_mantle,fg=$ctp_mocha_surface1]#[fg=$ctp_mocha_blue,bg=$ctp_mocha_surface0,bold] #I:#W#[fg=$ctp_mocha_surface0,bg=$ctp_mocha_mantle] "
setw -g window-status-separator ""

# Messages
set -g message-style "fg=$ctp_mocha_text,bg=$ctp_mocha_surface0,bold"
set -g message-command-style "fg=$ctp_mocha_text,bg=$ctp_mocha_surface0"

# Popup border
set -g popup-border-style "fg=$ctp_mocha_blue"
set -g popup-border-lines rounded
